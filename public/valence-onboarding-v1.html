<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>valence wave — cross-section</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0e;
    --border: rgba(200,198,190,0.1);
    --text: rgba(200,198,190,0.75);
    --text-dim: rgba(200,198,190,0.35);
    --accent: rgba(200,198,190,0.55);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', 'Courier New', monospace;
    font-size: 11px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px 16px;
    letter-spacing: 0.03em;
  }
  h1 {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: lowercase;
    color: var(--text-dim);
  }
  canvas { display: block; }
  .panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 560px;
  }
  .row {
    display: flex;
    flex-wrap: nowrap;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .label {
    color: var(--text-dim);
    flex-shrink: 0;
    width: 86px;
    letter-spacing: 0.08em;
  }
  .label-sm {
    color: var(--text-dim);
    flex-shrink: 0;
    width: 52px;
    font-size: 10px;
    letter-spacing: 0.06em;
  }
  .sep { flex-shrink: 0; width: 10px; }
  .btns { display: flex; gap: 3px; flex-shrink: 0; }
  button {
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 3px;
    border: 0.5px solid rgba(200,198,190,0.18);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  button:hover { background: rgba(200,198,190,0.06); color: var(--text); }
  button.active { background: rgba(200,198,190,0.1); color: var(--accent); border-color: rgba(200,198,190,0.3); }
  button:disabled { opacity: 0.22; cursor: default; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    color: var(--text-dim);
    flex-shrink: 0;
    white-space: nowrap;
  }
  .check-item:hover { color: var(--text); }
  input[type=checkbox] {
    appearance: none;
    width: 11px; height: 11px;
    border: 0.5px solid rgba(200,198,190,0.3);
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  input[type=checkbox]:checked { background: rgba(200,198,190,0.12); border-color: rgba(200,198,190,0.5); }
  input[type=checkbox]:checked::after {
    content: '';
    position: absolute;
    left: 2px; top: 2px;
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 1px;
  }
  input[type=range] {
    flex: 1;
    min-width: 40px;
    height: 2px;
    appearance: none;
    background: rgba(200,198,190,0.15);
    border-radius: 1px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .val {
    min-width: 34px;
    text-align: right;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .val-sm {
    min-width: 26px;
    text-align: right;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    font-size: 10px;
  }

  /* Color swatch */
  .swatch-group { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .swatch-label { color: var(--text-dim); font-size: 10px; letter-spacing: 0.06em; flex-shrink: 0; }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 3px;
    border: 0.5px solid rgba(200,198,190,0.25);
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    /* checkerboard to show alpha */
    background-image: linear-gradient(45deg,#444 25%,transparent 25%),
                      linear-gradient(-45deg,#444 25%,transparent 25%),
                      linear-gradient(45deg,transparent 75%,#444 75%),
                      linear-gradient(-45deg,transparent 75%,#444 75%);
    background-size: 6px 6px;
    background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
  }
  .swatch-color-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .swatch input[type=color] {
    position: absolute;
    inset: 0; width: 100%; height: 100%;
    opacity: 0; cursor: pointer; border: none; padding: 0;
  }
  .alpha-wrap {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
  }
  .alpha-label { color: var(--text-dim); font-size: 9px; letter-spacing: 0.05em; }
  .alpha-slider { width: 42px !important; flex: none !important; min-width: unset !important; }

  /* Style grid */
  .style-grid {
    display: grid;
    grid-template-columns: 86px repeat(4, 1fr);
    gap: 4px 6px;
    align-items: center;
  }
  .sg-head {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: center;
  }
  .sg-head.future { opacity: 0.3; }
  .sg-row-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .sg-btn {
    font-family: inherit;
    font-size: 9px;
    padding: 3px 0;
    border-radius: 3px;
    border: 0.5px solid rgba(200,198,190,0.15);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    text-align: center;
    width: 100%;
    transition: background 0.12s, color 0.12s;
  }
  .sg-btn:hover { background: rgba(200,198,190,0.06); color: var(--text); }
  .sg-btn.active { background: rgba(200,198,190,0.1); color: var(--accent); border-color: rgba(200,198,190,0.3); }
  .sg-btn.future { opacity: 0.22; cursor: default; pointer-events: none; }

  .fib-dots { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
  .fib-dot { height: 6px; border-radius: 1px; flex-shrink: 0; transition: width 0.2s, background 0.2s; }
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 2px 0; }
  .event-flash {
    position: fixed; top: 14px; right: 16px;
    font-size: 9px; letter-spacing: 0.2em;
    color: var(--text-dim); opacity: 0;
    transition: opacity 0.15s; pointer-events: none;
  }
  .event-flash.show { opacity: 1; }
</style>
</head>
<body>

<h1>valence wave / cross-section</h1>
<canvas id="c" width="480" height="480"></canvas>

<div class="panel">

  <div class="row">
    <span class="label">geometry</span>
    <div class="btns">
      <button class="active" id="btn-diametric" onclick="setGeometry('diametric')">diametric</button>
      <button id="btn-radial" onclick="setGeometry('radial')">radial</button>
    </div>
    <span class="sep"></span>
    <span class="label">animation</span>
    <div class="btns">
      <button id="btn-sim" onclick="setAnim('simultaneous')">simultaneous</button>
      <button class="active" id="btn-seq" onclick="setAnim('sequential')">sequential</button>
    </div>
  </div>

  <div class="row">
    <span class="label">traces</span>
    <div class="btns">
      <button class="active" id="btn-correlated" onclick="setTraceMode('correlated')">correlated</button>
      <button id="btn-random-trace" onclick="setTraceMode('random')">random</button>
    </div>
    <span class="sep"></span>
    <span class="label" id="order-label">order</span>
    <div class="btns" id="order-ctrl">
      <button id="btn-order-grouped" onclick="setOrder('grouped')">grouped</button>
      <button class="active" id="btn-order-random" onclick="setOrder('random')">random</button>
    </div>
  </div>

  <div class="row" id="group-row">
    <span class="label">groups</span>
    <input type="range" id="groupcount" min="1" max="7" step="1" value="3">
    <span class="val" id="groupcount-v">3</span>
    <div class="fib-dots" id="fib-dots"></div>
  </div>

  <hr class="divider">

  <div class="row">
    <label class="check-item">
      <input type="checkbox" id="guides">
      <span>show guides</span>
    </label>
    <span class="sep"></span>
    <label class="check-item">
      <input type="checkbox" id="dynamic">
      <span>dynamic styling</span>
    </label>
  </div>

  <hr class="divider">

  <!-- Style mode grid: rows = elements, cols = group | valence -->
  <div class="style-grid">
    <div class="sg-head"></div>
    <div class="sg-head">radial</div>
    <div class="sg-head future">trace</div>
    <div class="sg-head">cursor</div>
    <div class="sg-head future">fill</div>

    <div class="sg-row-label">group</div>
    <button class="sg-btn" id="st-radial-group"  onclick="setStyle('radial','group')">group</button>
    <button class="sg-btn future">group</button>
    <button class="sg-btn" id="st-cursor-group"  onclick="setStyle('cursor','group')">group</button>
    <button class="sg-btn future">group</button>

    <div class="sg-row-label">valence</div>
    <button class="sg-btn active" id="st-radial-valence" onclick="setStyle('radial','valence')">valence</button>
    <button class="sg-btn future">valence</button>
    <button class="sg-btn active" id="st-cursor-valence" onclick="setStyle('cursor','valence')">valence</button>
    <button class="sg-btn future">valence</button>
  </div>

  <hr class="divider">

  <!-- Colors with alpha -->
  <div class="row">
    <span class="label">colors</span>
    <div class="swatch-group">
      <span class="swatch-label">pos</span>
      <div class="swatch" id="swatch-pos">
        <div class="swatch-color-layer" id="swatch-pos-layer"></div>
        <input type="color" value="#50ff8c" oninput="updateColorRGB('pos',this.value)">
      </div>
      <div class="alpha-wrap">
        <span class="alpha-label">A</span>
        <input type="range" class="alpha-slider" min="0" max="1" step="0.05" value="1" oninput="updateColorA('pos',this.value,this)">
      </div>
    </div>
    <div class="swatch-group">
      <span class="swatch-label">neg</span>
      <div class="swatch" id="swatch-neg">
        <div class="swatch-color-layer" id="swatch-neg-layer"></div>
        <input type="color" value="#ff503c" oninput="updateColorRGB('neg',this.value)">
      </div>
      <div class="alpha-wrap">
        <span class="alpha-label">A</span>
        <input type="range" class="alpha-slider" min="0" max="1" step="0.05" value="1" oninput="updateColorA('neg',this.value,this)">
      </div>
    </div>
    <div class="swatch-group">
      <span class="swatch-label">neutral</span>
      <div class="swatch" id="swatch-neutral">
        <div class="swatch-color-layer" id="swatch-neutral-layer"></div>
        <input type="color" value="#000000" oninput="updateColorRGB('neutral',this.value)">
      </div>
      <div class="alpha-wrap">
        <span class="alpha-label">A</span>
        <input type="range" class="alpha-slider" min="0" max="1" step="0.05" value="1" oninput="updateColorA('neutral',this.value,this)">
      </div>
    </div>
  </div>

  <hr class="divider">

  <div class="row">
    <span class="label">chords</span>
    <input type="range" id="nchords" min="6" max="100" step="1" value="50">
    <span class="val" id="nchords-v">50</span>
  </div>

  <div class="row">
    <span class="label">opacity</span>
    <input type="range" id="opacity" min="0" max="1" step="0.02" value="1">
    <span class="val" id="opacity-v">1.00</span>
  </div>

  <div class="row">
    <span class="label">line width</span>
    <input type="range" id="linewidth" min="0" max="4" step="0.1" value="1.2">
    <span class="val" id="linewidth-v">1.2</span>
  </div>

  <div class="row">
    <span class="label">cursor radius</span>
    <input type="range" id="dotsize" min="0" max="8" step="0.5" value="3">
    <span class="val" id="dotsize-v">3.0</span>
  </div>

  <div class="row">
    <span class="label">event every</span>
    <input type="range" id="evtrate" min="3" max="30" step="1" value="8">
    <span class="val" id="evtrate-v">8s</span>
  </div>

  <div class="row">
    <span class="label">drift speed</span>
    <input type="range" id="driftspd" min="0.005" max="0.06" step="0.005" value="0.02">
    <span class="val" id="driftspd-v">0.020</span>
  </div>

  <hr class="divider">

  <div class="row">
    <button id="pbtn" onclick="togglePause()">pause</button>
    <button onclick="manualFireEvent()">fire event</button>
  </div>

</div>

<div class="event-flash" id="flash">event</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = 480, cx = S/2, cy = S/2;
const R = 180, R_MID = R / 2;

const FIBS = [1,2,3,5,8,13,21];

// Distinct hues for group coloring (7 max groups)
const GROUP_COLORS_RGB = [
  [80,  160, 255],  // 0: blue
  [255, 140, 50 ],  // 1: orange
  [200, 80,  255],  // 2: purple
  [50,  240, 180],  // 3: teal
  [255, 230, 50 ],  // 4: yellow
  [255, 80,  160],  // 5: pink
  [120, 255, 60 ],  // 6: lime
];

let paused = false;
let geoMode = 'diametric';
let animMode = 'sequential';
let traceMode = 'correlated';
let orderMode = 'random';
let morphT = 0;

// Each color has r,g,b (0-255) and a (0-1)
let colors = {
  pos:     { r:80,  g:255, b:140, a:1 },
  neg:     { r:255, g:80,  b:60,  a:1 },
  neutral: { r:0,   g:0,   b:0,   a:1 },
};

// Style modes per element
let styles = {
  radial: 'valence',  // 'group' | 'valence'
  cursor: 'valence',
};

function hexToRgb(hex) {
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}
function updateSwatchLayer(key) {
  const c = colors[key];
  document.getElementById('swatch-'+key+'-layer').style.background =
    `rgba(${c.r},${c.g},${c.b},${c.a})`;
}
function updateColorRGB(key, hex) {
  const {r,g,b} = hexToRgb(hex);
  colors[key].r = r; colors[key].g = g; colors[key].b = b;
  updateSwatchLayer(key);
}
function updateColorA(key, val, el) {
  colors[key].a = parseFloat(val);
  updateSwatchLayer(key);
}
// Init swatch layers
['pos','neg','neutral'].forEach(k => updateSwatchLayer(k));

function setStyle(element, mode) {
  styles[element] = mode;
  ['group','valence'].forEach(m => {
    document.getElementById(`st-${element}-${m}`).classList.toggle('active', m === mode);
  });
}

const nEl       = document.getElementById('nchords');
const evtEl     = document.getElementById('evtrate');
const driftEl   = document.getElementById('driftspd');
const dotEl     = document.getElementById('dotsize');
const lwEl      = document.getElementById('linewidth');
const opEl      = document.getElementById('opacity');
const gcEl      = document.getElementById('groupcount');
const guidesEl  = document.getElementById('guides');
const dynamicEl = document.getElementById('dynamic');
const flash     = document.getElementById('flash');
const groupRow  = document.getElementById('group-row');
const fibDots   = document.getElementById('fib-dots');

nEl.oninput     = () => { document.getElementById('nchords-v').textContent = nEl.value; initChords(); };
evtEl.oninput   = () => document.getElementById('evtrate-v').textContent = evtEl.value + 's';
driftEl.oninput = () => document.getElementById('driftspd-v').textContent = parseFloat(driftEl.value).toFixed(3);
dotEl.oninput   = () => document.getElementById('dotsize-v').textContent = parseFloat(dotEl.value).toFixed(1);
lwEl.oninput    = () => document.getElementById('linewidth-v').textContent = parseFloat(lwEl.value).toFixed(1);
opEl.oninput    = () => document.getElementById('opacity-v').textContent = parseFloat(opEl.value).toFixed(2);
gcEl.oninput    = () => { updateGroupCountUI(); initChords(); };

function getNumGroups() { return parseInt(gcEl.value); }

function updateGroupCountUI() {
  const n = getNumGroups();
  document.getElementById('groupcount-v').textContent = n;
  const weights = FIBS.slice(0, n);
  const total = weights.reduce((a,b)=>a+b, 0);
  fibDots.innerHTML = '';
  weights.forEach((w, i) => {
    const d = document.createElement('div');
    d.className = 'fib-dot';
    d.style.width = Math.max(4, Math.round((w/total)*80)) + 'px';
    const [r,g,b] = GROUP_COLORS_RGB[i % GROUP_COLORS_RGB.length];
    d.style.background = `rgba(${r},${g},${b},0.6)`;
    d.title = Math.round(w/total*100) + '%';
    fibDots.appendChild(d);
  });
}
updateGroupCountUI();

let flashTimer = null;
function showFlash() {
  flash.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => flash.classList.remove('show'), 700);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pbtn').textContent = paused ? 'resume' : 'pause';
  if (!paused) tick();
}
function setGeometry(m) {
  geoMode = m;
  document.getElementById('btn-radial').classList.toggle('active', m === 'radial');
  document.getElementById('btn-diametric').classList.toggle('active', m === 'diametric');
}
function setAnim(m) {
  animMode = m;
  document.getElementById('btn-seq').classList.toggle('active', m === 'sequential');
  document.getElementById('btn-sim').classList.toggle('active', m === 'simultaneous');
}
function setTraceMode(m) {
  traceMode = m;
  document.getElementById('btn-random-trace').classList.toggle('active', m === 'random');
  document.getElementById('btn-correlated').classList.toggle('active', m === 'correlated');
  const corr = m === 'correlated';
  ['order-ctrl','order-label'].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = corr ? '1' : '0.28';
    el.style.pointerEvents = corr ? 'auto' : 'none';
  });
  groupRow.style.opacity = corr ? '1' : '0.28';
  groupRow.style.pointerEvents = corr ? 'auto' : 'none';
  initChords();
}
function setOrder(m) {
  orderMode = m;
  document.getElementById('btn-order-random').classList.toggle('active', m === 'random');
  document.getElementById('btn-order-grouped').classList.toggle('active', m === 'grouped');
  initChords();
}

let groupTargets = [0,0,0];
let eventTimer = 0;

// Full -1..+1 range
function randomVal() { return Math.random() * 2 - 1; }

function fireGroupEvent() {
  const ng = getNumGroups();
  groupTargets = Array.from({length: ng}, () => randomVal());
  showFlash();
}
function fireEvent() {
  if (traceMode === 'correlated') fireGroupEvent();
  else { chords.forEach(c => { c.target = randomVal(); }); showFlash(); }
}
function manualFireEvent() { eventTimer = 0; fireEvent(); }

function assignBase(pos, numGroups) {
  const weights = FIBS.slice(0, numGroups);
  const total = weights.reduce((a,b)=>a+b, 0);
  let cum = 0;
  for (let g = 0; g < numGroups; g++) {
    cum += weights[g] / total;
    if (pos < cum) return g;
  }
  return numGroups - 1;
}

let chords = [];
function initChords() {
  const n = parseInt(nEl.value);
  const ng = getNumGroups();
  chords = [];
  if (traceMode === 'random') {
    for (let i = 0; i < n; i++)
      chords.push({ mode:'random', value:randomVal()*0.4, target:randomVal() });
    return;
  }
  let assignments = Array.from({length:n}, (_,i) => assignBase((i+0.5)/n, ng));
  if (orderMode === 'random') {
    for (let i = assignments.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [assignments[i],assignments[j]] = [assignments[j],assignments[i]];
    }
  }
  for (let i = 0; i < n; i++) {
    chords.push({
      mode:'correlated', baseIdx:assignments[i],
      value:(Math.random()-0.5)*0.3,
      noiseOffset:(Math.random()-0.5)*0.12,
    });
  }
  while (groupTargets.length < ng) groupTargets.push(randomVal());
  groupTargets.length = ng;
  fireGroupEvent();
}
initChords();

function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function clamp01(t) { return Math.min(Math.max(t,0),1); }

// Returns [r,g,b] for valence coloring — neutral→pos/neg based on |v|
function valenceRGB(v) {
  const t = Math.pow(Math.abs(v), 0.55);
  const {r:nr, g:ng, b:nb} = colors.neutral;
  const src = v >= 0 ? colors.pos : colors.neg;
  return [
    Math.round(nr + (src.r-nr)*t),
    Math.round(ng + (src.g-ng)*t),
    Math.round(nb + (src.b-nb)*t),
  ];
}

// Returns [r,g,b,a] for a chord element given style mode
// mode: 'valence' | 'group'
// masterOp: global opacity multiplier
function elementRGBA(chord, v, mode, masterOp) {
  if (mode === 'group' && chord.mode === 'correlated') {
    const [r,g,b] = GROUP_COLORS_RGB[chord.baseIdx % GROUP_COLORS_RGB.length];
    return [r, g, b, masterOp];
  }
  // valence mode
  const [r,g,b] = valenceRGB(v);
  // alpha: blend between neutral.a and pos/neg.a based on |v|, then scale by masterOp
  const t = Math.pow(Math.abs(v), 0.55);
  const srcA = v >= 0 ? colors.pos.a : colors.neg.a;
  const a = (colors.neutral.a + (srcA - colors.neutral.a) * t) * masterOp;
  return [r, g, b, Math.min(1, Math.max(0, a))];
}

function neutralRGBA(masterOp) {
  const {r,g,b,a} = colors.neutral;
  return [r, g, b, a * masterOp];
}

function rgbaStr(rgba) {
  return `rgba(${rgba[0]},${rgba[1]},${rgba[2]},${rgba[3].toFixed(3)})`;
}

function getPhases(mt, toRadial) {
  if (animMode === 'simultaneous') { const e=ease(mt); return {p1:e,p2:e}; }
  if (toRadial) return { p1:ease(clamp01(mt*2)), p2:ease(clamp01((mt-0.5)*2)) };
  const rev=1-mt;
  return { p2:1-ease(clamp01(rev*2)), p1:1-ease(clamp01((rev-0.5)*2)) };
}

function getChordPoints(i, n, v, p1, p2) {
  const tilt=(Math.PI/n)*0.5;
  const absV=Math.abs(v);
  const dAxisAngle=(i/n)*Math.PI+tilt;
  const dTipAngle=v>=0?dAxisAngle+Math.PI:dAxisAngle;
  const dTipX=cx+Math.cos(dTipAngle)*R*absV;
  const dTipY=cy+Math.sin(dTipAngle)*R*absV;
  const rSpokeAngle=(i/n)*2*Math.PI+tilt-Math.PI/2;
  let sd=rSpokeAngle-dAxisAngle;
  while(sd>Math.PI)sd-=2*Math.PI; while(sd<-Math.PI)sd+=2*Math.PI;
  const sa=dAxisAngle+sd*p2;
  const sc=Math.cos(sa), ss=Math.sin(sa);
  const rRootX=cx+sc*R_MID, rRootY=cy+ss*R_MID;
  const rTipR=R_MID*(1-v);
  return {
    rootX:cx+(rRootX-cx)*p1, rootY:cy+(rRootY-cy)*p1,
    tipX:dTipX+(cx+sc*rTipR-dTipX)*p1,
    tipY:dTipY+(cy+ss*rTipR-dTipY)*p1,
  };
}

function getGuidePoints(i, n, p1, p2) {
  const tilt=(Math.PI/n)*0.5;
  const da=(i/n)*Math.PI+tilt;
  const dNx=cx+Math.cos(da)*R, dNy=cy+Math.sin(da)*R;
  const dPx=cx+Math.cos(da+Math.PI)*R, dPy=cy+Math.sin(da+Math.PI)*R;
  const rsa=(i/n)*2*Math.PI+tilt-Math.PI/2;
  let sd=rsa-da; while(sd>Math.PI)sd-=2*Math.PI; while(sd<-Math.PI)sd+=2*Math.PI;
  const sa=da+sd*p2, sc=Math.cos(sa), ss=Math.sin(sa);
  return {
    posX:dPx+(cx-dPx)*p1, posY:dPy+(cy-dPy)*p1,
    negX:dNx+(cx+sc*R-dNx)*p1, negY:dNy+(cy+ss*R-dNy)*p1,
  };
}

function draw() {
  const n         = parseInt(nEl.value);
  const driftSpd  = parseFloat(driftEl.value);
  const evtIntvl  = parseFloat(evtEl.value);
  const dotBase   = parseFloat(dotEl.value);
  const lineW     = parseFloat(lwEl.value);
  const masterOp  = parseFloat(opEl.value);
  const showGuides= guidesEl.checked;
  const dynamic   = dynamicEl.checked;

  if (!paused) {
    eventTimer += 1/60;
    if (eventTimer >= evtIntvl) { eventTimer=0; fireEvent(); }
  }

  const ng = getNumGroups();
  for (let i=0; i<n; i++) {
    const c=chords[i];
    let target;
    if (c.mode==='correlated') {
      const gIdx=Math.min(c.baseIdx, ng-1);
      target=Math.max(-1, Math.min(1, (groupTargets[gIdx]||0)+c.noiseOffset));
    } else {
      target=c.target;
    }
    c.value += (target-c.value)*driftSpd;
    // Clamp to [-1, 1]
    c.value = Math.max(-1, Math.min(1, c.value));
  }

  const tgt=geoMode==='radial'?1:0;
  morphT+=(tgt-morphT)*0.05;
  if(Math.abs(morphT-tgt)<0.0005)morphT=tgt;
  const mt=clamp01(morphT);
  const {p1,p2}=getPhases(mt,tgt===1);

  ctx.clearRect(0,0,S,S);

  if(p1>0.01){
    ctx.beginPath(); ctx.arc(cx,cy,R_MID,0,Math.PI*2);
    ctx.strokeStyle=`rgba(180,178,169,${p1*0.32})`;
    ctx.lineWidth=1; ctx.setLineDash([3,5]); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,178,169,0.22)'; ctx.lineWidth=2.5; ctx.stroke();

  for(let i=0;i<48;i++){
    const a=(i/48)*Math.PI*2;
    ctx.beginPath(); ctx.arc(cx+Math.cos(a)*R,cy+Math.sin(a)*R,1.5,0,Math.PI*2);
    ctx.fillStyle='rgba(180,178,169,0.25)'; ctx.fill();
  }

  if(p1<0.99){
    const f=1-p1;
    ctx.beginPath();
    ctx.moveTo(cx,cy-R-16); ctx.lineTo(cx,cy+R+16);
    ctx.moveTo(cx-R-16,cy); ctx.lineTo(cx+R+16,cy);
    ctx.strokeStyle=`rgba(180,178,169,${f*0.10})`; ctx.lineWidth=0.5; ctx.stroke();
    ctx.font='13px "DM Mono",monospace';
    ctx.fillStyle=`rgba(180,178,169,${f*0.38})`; ctx.textAlign='center';
    ctx.fillText('+',cx-R-24,cy+4); ctx.fillText('−',cx+R+24,cy+4);
  }

  const guideColor=`rgba(155,153,145,${0.22*masterOp})`;
  const guideW=Math.max(0.3, lineW>0?lineW*0.5:0.5);

  if(showGuides){
    for(let i=0;i<n;i++){
      const {posX,posY,negX,negY}=getGuidePoints(i,n,p1,p2);
      ctx.beginPath(); ctx.moveTo(posX,posY); ctx.lineTo(negX,negY);
      ctx.strokeStyle=guideColor; ctx.lineWidth=guideW; ctx.lineCap='round'; ctx.stroke();
      const tl=3, ang=Math.atan2(negY-posY,negX-posX)+Math.PI/2;
      const tc=Math.cos(ang), ts=Math.sin(ang);
      [[posX,posY],[negX,negY]].forEach(([ex,ey])=>{
        ctx.beginPath(); ctx.moveTo(ex-tc*tl,ey-ts*tl); ctx.lineTo(ex+tc*tl,ey+ts*tl);
        ctx.strokeStyle=guideColor; ctx.lineWidth=guideW; ctx.stroke();
      });
    }
  }

  for(let i=0;i<n;i++){
    const c=chords[i];
    const v=c.value;
    const absV=Math.abs(v);
    const {rootX,rootY,tipX,tipY}=getChordPoints(i,n,v,p1,p2);
    const ld=Math.sqrt((tipX-rootX)**2+(tipY-rootY)**2);
    if(ld<0.5) continue;

    // Colors for line (radial style) and cursor
    const lineRGBA   = elementRGBA(c, v, styles.radial, masterOp);
    const cursorRGBA = elementRGBA(c, v, styles.cursor, masterOp);
    const rootRGBA   = neutralRGBA(masterOp);

    if(lineW>0){
      const lw = dynamic ? lineW*(0.3+absV*0.85) : lineW;
      // Gradient: neutral at root → element color at tip
      const g = ctx.createLinearGradient(rootX,rootY,tipX,tipY);
      g.addColorStop(0, rgbaStr(rootRGBA));
      g.addColorStop(1, rgbaStr(lineRGBA));
      ctx.beginPath(); ctx.moveTo(rootX,rootY); ctx.lineTo(tipX,tipY);
      ctx.strokeStyle=g; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
    }

    if(dotBase>0){
      const dotR = dynamic ? dotBase*(0.3+absV*0.85) : dotBase;
      ctx.beginPath(); ctx.arc(tipX,tipY,dotR,0,Math.PI*2);
      ctx.fillStyle=rgbaStr(cursorRGBA); ctx.fill();
    }
  }

  if(p1<0.99){
    ctx.beginPath(); ctx.arc(cx,cy,3.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,198,190,${(1-p1)*0.42})`; ctx.fill();
  }
}

function tick(){ if(!paused){ draw(); requestAnimationFrame(tick); } }
tick();
</script>
</body>
</html>
