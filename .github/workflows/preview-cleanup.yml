name: Delete PR Preview

# DISABLED: preview deployments broken (https://github.com/partykit/partykit/issues/985)
# Replaced by staging-deploy.yml which deploys all PRs to shared staging env.
# on:
#   pull_request:
#     types: [closed]
on:
  workflow_dispatch:

jobs:
  delete-preview:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec partykit delete --preview pr-${{ github.event.pull_request.number }} --force
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: patcon
