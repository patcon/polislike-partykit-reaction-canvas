name: Deploy Event Preview

on:
  issues:
    types: [labeled, closed]

concurrency:
  group: event-preview-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  deploy-event-preview:
    if: github.event.action == 'labeled' && github.event.label.name == 'event-preview'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Parse issue config
        id: config
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          SLUG=$(echo "$ISSUE_BODY" | grep 'slug:' | sed 's/.*slug: *//' | tr -d '\r\n' | head -c 40)
          [ -z "$SLUG" ] && SLUG="event-$ISSUE_NUMBER"
          HASH=$(echo "$ISSUE_BODY" | grep 'hash:' | sed 's/.*hash: *//' | tr -d '\r\n' | head -c 10)
          [ -z "$HASH" ] && HASH="v4"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Generate partykit.event.json
        env:
          PARTYKIT_EVENT_PROJECT: ${{ secrets.PARTYKIT_EVENT_PROJECT }}
        run: |
          jq --arg name "$PARTYKIT_EVENT_PROJECT" \
             '.name = $name | .serve.build.define["PARTYKIT_EVENT_BUILD"] = "true"' \
             partykit.json > partykit.event.json

      - name: Generate event index.html
        env:
          HASH: ${{ steps.config.outputs.hash }}
        run: |
          pnpm run build:worker
          pnpm run cachebust
          sed -i 's|<title>[^<]*</title>|<title>App</title>|' public/index.html
          sed -i '/<meta name="title"/d' public/index.html
          sed -i '/<meta name="description"/d' public/index.html
          sed -i '/<meta name="author"/d' public/index.html
          sed -i "s|</head>|<script>if (!window.location.hash) window.location.hash = '#${HASH}';</script>\n  </head>|" public/index.html

      - name: Deploy event preview
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: patcon
          SLUG: ${{ steps.config.outputs.slug }}
        run: |
          pnpm exec partykit deploy --config partykit.event.json --preview "$SLUG"

      - name: Set Telegram env vars for event preview
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: patcon
          SLUG: ${{ steps.config.outputs.slug }}
        run: |
          pnpm exec partykit env pull partykit.event.json
          pnpm exec partykit env push --config partykit.event.json --preview "$SLUG"

      - name: Post deployment comment
        uses: actions/github-script@v9
        env:
          SLUG: ${{ steps.config.outputs.slug }}
          PARTYKIT_EVENT_PROJECT: ${{ secrets.PARTYKIT_EVENT_PROJECT }}
        with:
          script: |
            const slug = process.env.SLUG;
            const project = process.env.PARTYKIT_EVENT_PROJECT;
            const url = `https://${slug}.${project}.patcon.partykit.dev`;
            const marker = '<!-- event-preview-url -->';
            const body = `${marker}\nEvent preview deployed: ${url}\n\nClose this issue to tear down the preview.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  delete-event-preview:
    if: github.event.action == 'closed' && contains(toJson(github.event.issue.labels.*.name), 'event-preview')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Parse slug from issue
        id: config
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SLUG=$(echo "$ISSUE_BODY" | grep 'slug:' | sed 's/.*slug: *//' | tr -d '\r\n' | head -c 40)
          [ -z "$SLUG" ] && SLUG="event-$ISSUE_NUMBER"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Delete event preview
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: patcon
          SLUG: ${{ steps.config.outputs.slug }}
          PARTYKIT_EVENT_PROJECT: ${{ secrets.PARTYKIT_EVENT_PROJECT }}
        run: |
          jq --arg name "$PARTYKIT_EVENT_PROJECT" '.name = $name' partykit.json > partykit.tmp.json
          mv partykit.tmp.json partykit.json
          pnpm exec partykit delete --preview "$SLUG" --force

      - name: Redact preview URL and post teardown comment
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- event-preview-url -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${marker}\nEvent preview torn down. Link: <link removed>`,
              });
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Event preview torn down.',
            });
