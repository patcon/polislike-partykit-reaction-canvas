name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - run: npm ci
      - run: npm run cachebust && npx partykit deploy --preview pr-${{ github.event.pull_request.number }} --with-vars
        env:
          PARTYKIT_TOKEN: ${{ secrets.PARTYKIT_TOKEN }}
          PARTYKIT_LOGIN: patcon
          PARTYKIT_HOST: pr-${{ github.event.pull_request.number }}.polislike-partykit-reaction-canvas.patcon.partykit.dev
      - uses: actions/github-script@v7
        with:
          script: |
            const num = context.payload.pull_request.number;
            const url = `https://pr-${num}.polislike-partykit-reaction-canvas.patcon.partykit.dev`;
            const marker = '<!-- preview-url -->';
            const body = `${marker}\nPreview deployed: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: num,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: num,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }
